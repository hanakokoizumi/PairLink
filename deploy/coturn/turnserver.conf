# PairLink coturn skeleton — edit before production use.
# Mirror credentials in RTC_CONFIG (see .env.example).

listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech

realm=pairlink.local

# Set long-term credentials before enabling `docker compose --profile turn up`.
# Example: user=youruser:your-strong-password
# user=turnuser:turnpass

# Uncomment and set your public IP or hostname for cross-NAT relay:
# external-ip=YOUR_PUBLIC_IP
# relay-ip=YOUR_PUBLIC_IP

no-cli
no-multicast-peers

log-file=stdout
verbose
