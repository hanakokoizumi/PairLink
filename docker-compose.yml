services:
  pairlink:
    image: ghcr.io/${GHCR_OWNER:-hanakokoizumi}/pairlink:${PAIRLINK_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    env_file:
      - path: .env
        required: false
    environment:
      PAIRLINK_LOAD_DOTENV: "false"
      TURN_ENABLED: ${TURN_ENABLED:-true}
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      coturn:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  coturn:
    image: coturn/coturn:4.6.2
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      TURN_ENABLED: ${TURN_ENABLED:-true}
    volumes:
      - ./deploy/coturn-entrypoint.sh:/usr/local/bin/coturn-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/coturn-entrypoint.sh"]
    restart: unless-stopped
